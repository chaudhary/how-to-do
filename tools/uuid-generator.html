---
layout: tool
title: UUID Generator
---

<div class="tool-header">
  <h1>UUID Generator</h1>
  <p>Generate random UUIDs (v4) instantly.</p>
</div>

<div class="calc-form">
  <div class="form-group">
    <label for="count">Number of UUIDs</label>
    <input type="number" id="count" value="5" min="1" max="100" step="1">
  </div>
  <div class="form-group">
    <label for="format">Format</label>
    <select id="format">
      <option value="lower">Lowercase (default)</option>
      <option value="upper">UPPERCASE</option>
      <option value="nohyphens">No hyphens</option>
      <option value="braces">With braces {uuid}</option>
    </select>
  </div>
  <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
    <button class="btn" onclick="generate()">Generate</button>
    <button class="btn" onclick="copyAll()" style="background:var(--color-accent);">Copy All</button>
  </div>
</div>

<div class="form-group" style="margin-top:1.5rem;">
  <label>Generated UUIDs</label>
  <textarea id="output" rows="10" style="width:100%;padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius);font-family:monospace;font-size:0.9rem;resize:vertical;" readonly></textarea>
</div>

<script>
function uuidv4(){
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
    var r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}
function generate(){
  var count=parseInt(document.getElementById('count').value)||1;
  var format=document.getElementById('format').value;
  var uuids=[];
  for(var i=0;i<count;i++){
    var u=uuidv4();
    if(format==='upper')u=u.toUpperCase();
    else if(format==='nohyphens')u=u.replace(/-/g,'');
    else if(format==='braces')u='{'+u+'}';
    uuids.push(u);
  }
  document.getElementById('output').value=uuids.join('\n');
}
function copyAll(){var o=document.getElementById('output');if(o.value)navigator.clipboard.writeText(o.value);}
generate();
</script>
