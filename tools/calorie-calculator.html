---
layout: tool
title: Calorie Calculator
---

<div class="tool-header">
  <h1>Calorie Calculator</h1>
  <p>Estimate your daily calorie needs (BMR and TDEE).</p>
</div>

<div class="calc-form">
  <div class="form-group">
    <label for="gender">Gender</label>
    <select id="gender">
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>
  </div>
  <div class="form-group">
    <label for="age">Age (years)</label>
    <input type="number" id="age" placeholder="e.g. 30" min="1" step="1">
  </div>
  <div class="form-group">
    <label for="weight">Weight (kg)</label>
    <input type="number" id="weight" placeholder="e.g. 70" min="1" step="any">
  </div>
  <div class="form-group">
    <label for="height">Height (cm)</label>
    <input type="number" id="height" placeholder="e.g. 170" min="1" step="any">
  </div>
  <div class="form-group">
    <label for="activity">Activity Level</label>
    <select id="activity">
      <option value="1.2">Sedentary (little or no exercise)</option>
      <option value="1.375">Lightly active (1-3 days/week)</option>
      <option value="1.55" selected>Moderately active (3-5 days/week)</option>
      <option value="1.725">Very active (6-7 days/week)</option>
      <option value="1.9">Extra active (physical job or 2x training)</option>
    </select>
  </div>
  <button class="btn" onclick="calculate()">Calculate</button>
</div>

<div class="results" id="results">
  <h2>Your Daily Calorie Needs</h2>
  <div class="result-row">
    <span class="result-label">BMR (Basal Metabolic Rate)</span>
    <span class="result-value" id="bmr"></span>
  </div>
  <div class="result-row">
    <span class="result-label">Maintenance Calories (TDEE)</span>
    <span class="result-value" id="tdee"></span>
  </div>
  <div class="result-row">
    <span class="result-label">Weight Loss (~0.5 kg/week)</span>
    <span class="result-value" id="lose"></span>
  </div>
  <div class="result-row">
    <span class="result-label">Weight Gain (~0.5 kg/week)</span>
    <span class="result-value" id="gain"></span>
  </div>
</div>

<script>
function calculate() {
  var gender = document.getElementById('gender').value;
  var age = parseInt(document.getElementById('age').value);
  var w = parseFloat(document.getElementById('weight').value);
  var h = parseFloat(document.getElementById('height').value);
  var act = parseFloat(document.getElementById('activity').value);
  if (!age||!w||!h) { alert('Please fill all fields.'); return; }
  var bmr;
  if (gender === 'male') bmr = 10*w + 6.25*h - 5*age + 5;
  else bmr = 10*w + 6.25*h - 5*age - 161;
  var tdee = bmr * act;
  document.getElementById('bmr').textContent = Math.round(bmr) + ' cal/day';
  document.getElementById('tdee').textContent = Math.round(tdee) + ' cal/day';
  document.getElementById('lose').textContent = Math.round(tdee - 500) + ' cal/day';
  document.getElementById('gain').textContent = Math.round(tdee + 500) + ' cal/day';
  document.getElementById('results').classList.add('visible');
}
</script>
