---
layout: tool
title: URL Encoder/Decoder
---

<div class="tool-header">
  <h1>URL Encoder / Decoder</h1>
  <p>Encode or decode URL components and query strings.</p>
</div>

<div class="calc-form">
  <div class="form-group">
    <label for="input">Input</label>
    <textarea id="input" rows="5" style="width:100%;padding:0.6rem 0.75rem;border:1px solid var(--color-border);border-radius:var(--radius);font-family:monospace;font-size:0.9rem;resize:vertical;" placeholder="Enter text or URL to encode/decode"></textarea>
  </div>
  <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
    <button class="btn" onclick="encodeIt()">Encode</button>
    <button class="btn" onclick="decodeIt()" style="background:var(--color-muted);">Decode</button>
    <button class="btn" onclick="encodeComp()" style="background:#8b5cf6;">Encode Component</button>
    <button class="btn" onclick="copyOut()" style="background:var(--color-accent);">Copy</button>
  </div>
  <div id="status" style="margin-top:0.75rem;font-weight:600;"></div>
  <div class="form-group" style="margin-top:1rem;">
    <label for="output">Output</label>
    <textarea id="output" rows="5" style="width:100%;padding:0.6rem 0.75rem;border:1px solid var(--color-border);border-radius:var(--radius);font-family:monospace;font-size:0.9rem;resize:vertical;" readonly></textarea>
  </div>
</div>

<script>
function encodeIt(){try{document.getElementById('output').value=encodeURI(document.getElementById('input').value);setStatus('Encoded','var(--color-accent)');}catch(e){setStatus('Error: '+e.message,'red');}}
function decodeIt(){try{document.getElementById('output').value=decodeURIComponent(document.getElementById('input').value);setStatus('Decoded','var(--color-accent)');}catch(e){setStatus('Error: '+e.message,'red');}}
function encodeComp(){try{document.getElementById('output').value=encodeURIComponent(document.getElementById('input').value);setStatus('Component encoded','var(--color-accent)');}catch(e){setStatus('Error: '+e.message,'red');}}
function copyOut(){var o=document.getElementById('output');if(!o.value)return;navigator.clipboard.writeText(o.value);setStatus('Copied!','var(--color-primary)');}
function setStatus(t,c){var s=document.getElementById('status');s.textContent=t;s.style.color=c;}
</script>
