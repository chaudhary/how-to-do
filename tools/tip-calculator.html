---
layout: tool
title: Tip Calculator
description: "Calculate tip amount and split the total bill among any number of people. Supports custom tip percentages."
---

<div class="tool-header">
  <h1>Tip Calculator & Bill Splitter</h1>
  <p>Calculate tip and split the bill among friends.</p>
</div>

<div class="calc-form">
  <div class="form-group">
    <label for="bill">Bill Amount</label>
    <input type="number" id="bill" placeholder="e.g. 1500" min="0.01" step="any">
  </div>
  <div class="form-group">
    <label for="tip">Tip Percentage (%)</label>
    <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
      <button class="btn" style="padding:0.4rem 0.8rem;font-size:0.85rem;" onclick="setTip(10)">10%</button>
      <button class="btn" style="padding:0.4rem 0.8rem;font-size:0.85rem;" onclick="setTip(15)">15%</button>
      <button class="btn" style="padding:0.4rem 0.8rem;font-size:0.85rem;" onclick="setTip(20)">20%</button>
      <button class="btn" style="padding:0.4rem 0.8rem;font-size:0.85rem;" onclick="setTip(25)">25%</button>
    </div>
    <input type="number" id="tip" placeholder="e.g. 15" min="0" step="any" value="15">
  </div>
  <div class="form-group">
    <label for="people">Split Between (people)</label>
    <input type="number" id="people" placeholder="e.g. 4" min="1" step="1" value="1">
  </div>
  <button class="btn" onclick="calculate()">Calculate</button>
</div>

<div class="results" id="results">
  <h2>Results</h2>
  <div class="result-row">
    <span class="result-label">Tip Amount</span>
    <span class="result-value" id="tipamt"></span>
  </div>
  <div class="result-row">
    <span class="result-label">Total with Tip</span>
    <span class="result-value" id="total"></span>
  </div>
  <div class="result-row">
    <span class="result-label">Per Person</span>
    <span class="result-value" id="perperson"></span>
  </div>
</div>

<script>
function fmt(n) { return n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function setTip(v) { document.getElementById('tip').value = v; }
function calculate() {
  var bill = parseFloat(document.getElementById('bill').value);
  var tip = parseFloat(document.getElementById('tip').value);
  var people = parseInt(document.getElementById('people').value);
  if (!bill || bill <= 0 || isNaN(tip) || !people || people < 1) { alert('Please enter valid values.'); return; }
  var tipAmt = bill * tip / 100;
  var total = bill + tipAmt;
  document.getElementById('tipamt').textContent = fmt(tipAmt);
  document.getElementById('total').textContent = fmt(total);
  document.getElementById('perperson').textContent = fmt(total / people);
  document.getElementById('results').classList.add('visible');
}
</script>
