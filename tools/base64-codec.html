---
layout: tool
title: Base64 Encode/Decode
description: "Encode plain text to Base64 or decode Base64 back to readable text instantly. No server, runs entirely in your browser."
---

<div class="tool-header">
  <h1>Base64 Encode / Decode</h1>
  <p>Encode text to Base64 or decode Base64 back to text.</p>
</div>

<div class="calc-form">
  <div class="form-group">
    <label for="input">Input</label>
    <textarea id="input" rows="6" style="width:100%;padding:0.6rem 0.75rem;border:1px solid var(--color-border);border-radius:var(--radius);font-family:monospace;font-size:0.9rem;resize:vertical;" placeholder="Enter text or Base64 string"></textarea>
  </div>
  <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
    <button class="btn" onclick="encode()">Encode</button>
    <button class="btn" onclick="decode()" style="background:var(--color-muted);">Decode</button>
    <button class="btn" onclick="copyOut()" style="background:var(--color-accent);">Copy Output</button>
  </div>
  <div id="status" style="margin-top:0.75rem;font-weight:600;"></div>
  <div class="form-group" style="margin-top:1rem;">
    <label for="output">Output</label>
    <textarea id="output" rows="6" style="width:100%;padding:0.6rem 0.75rem;border:1px solid var(--color-border);border-radius:var(--radius);font-family:monospace;font-size:0.9rem;resize:vertical;" readonly></textarea>
  </div>
</div>

<script>
function encode() {
  var input = document.getElementById('input').value;
  if (!input) return;
  try {
    document.getElementById('output').value = btoa(unescape(encodeURIComponent(input)));
    document.getElementById('status').textContent = 'Encoded successfully.';
    document.getElementById('status').style.color = 'var(--color-accent)';
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
    document.getElementById('status').style.color = 'red';
  }
}
function decode() {
  var input = document.getElementById('input').value.trim();
  if (!input) return;
  try {
    document.getElementById('output').value = decodeURIComponent(escape(atob(input)));
    document.getElementById('status').textContent = 'Decoded successfully.';
    document.getElementById('status').style.color = 'var(--color-accent)';
  } catch(e) {
    document.getElementById('status').textContent = 'Invalid Base64: ' + e.message;
    document.getElementById('status').style.color = 'red';
  }
}
function copyOut() {
  var output = document.getElementById('output');
  if (!output.value) return;
  navigator.clipboard.writeText(output.value);
  document.getElementById('status').textContent = 'Copied!';
  document.getElementById('status').style.color = 'var(--color-primary)';
}
</script>
