---
layout: tool
title: Password Generator
---

<div class="tool-header">
  <h1>Password Generator</h1>
  <p>Generate strong, random passwords with customizable options.</p>
</div>

<div class="calc-form">
  <div class="form-group">
    <label for="length">Password Length: <span id="lenDisplay">16</span></label>
    <input type="range" id="length" min="4" max="128" value="16" style="width:100%;" oninput="document.getElementById('lenDisplay').textContent=this.value;generate()">
  </div>
  <div class="form-group">
    <label>Character Types</label>
    <div style="display:flex;flex-wrap:wrap;gap:1rem;">
      <label style="font-weight:normal;display:flex;align-items:center;gap:0.35rem;cursor:pointer;"><input type="checkbox" id="upper" checked onchange="generate()"> Uppercase (A-Z)</label>
      <label style="font-weight:normal;display:flex;align-items:center;gap:0.35rem;cursor:pointer;"><input type="checkbox" id="lower" checked onchange="generate()"> Lowercase (a-z)</label>
      <label style="font-weight:normal;display:flex;align-items:center;gap:0.35rem;cursor:pointer;"><input type="checkbox" id="digits" checked onchange="generate()"> Digits (0-9)</label>
      <label style="font-weight:normal;display:flex;align-items:center;gap:0.35rem;cursor:pointer;"><input type="checkbox" id="symbols" checked onchange="generate()"> Symbols (!@#$...)</label>
    </div>
  </div>
  <div class="form-group">
    <label for="count">Number of Passwords</label>
    <input type="number" id="count" value="4" min="1" max="20" step="1">
  </div>
  <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
    <button class="btn" onclick="generate()">Generate</button>
    <button class="btn" onclick="copyAll()" style="background:var(--color-accent);">Copy All</button>
  </div>
</div>

<div id="passwords" style="margin-top:1.5rem;"></div>

<script>
function generate(){
  var len=parseInt(document.getElementById('length').value);
  var count=parseInt(document.getElementById('count').value)||1;
  var chars='';
  if(document.getElementById('upper').checked)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('lower').checked)chars+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('digits').checked)chars+='0123456789';
  if(document.getElementById('symbols').checked)chars+='!@#$%^&*()_+-=[]{}|;:,.<>?';
  if(!chars){alert('Select at least one character type.');return;}
  var container=document.getElementById('passwords');
  container.innerHTML='';
  for(var i=0;i<count;i++){
    var pwd='';
    var arr=new Uint32Array(len);
    crypto.getRandomValues(arr);
    for(var j=0;j<len;j++)pwd+=chars[arr[j]%chars.length];
    var strength=getStrength(pwd);
    var div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:0.5rem;padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius);margin-bottom:0.5rem;background:var(--color-card-bg);';
    div.innerHTML='<code style="flex:1;font-size:0.9rem;word-break:break-all;">'+pwd.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</code><span style="font-size:0.75rem;padding:0.2rem 0.5rem;border-radius:4px;background:'+strength.color+';color:white;flex-shrink:0;">'+strength.label+'</span><button class="btn" style="padding:0.35rem 0.7rem;font-size:0.8rem;flex-shrink:0;" onclick="navigator.clipboard.writeText(this.parentElement.querySelector(\'code\').textContent)">Copy</button>';
    container.appendChild(div);
  }
}
function getStrength(pwd){
  var score=0;
  if(pwd.length>=8)score++;if(pwd.length>=12)score++;if(pwd.length>=16)score++;
  if(/[a-z]/.test(pwd)&&/[A-Z]/.test(pwd))score++;
  if(/\d/.test(pwd))score++;
  if(/[^a-zA-Z0-9]/.test(pwd))score++;
  if(score<=2)return{label:'Weak',color:'#dc2626'};
  if(score<=4)return{label:'Good',color:'#f59e0b'};
  return{label:'Strong',color:'#10b981'};
}
function copyAll(){
  var codes=document.querySelectorAll('#passwords code');
  var all=Array.from(codes).map(function(c){return c.textContent}).join('\n');
  if(all)navigator.clipboard.writeText(all);
}
generate();
</script>
