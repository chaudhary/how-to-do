---
layout: tool
title: Blog Outline Generator
---

<div class="tool-header">
  <h1>Blog Outline Generator</h1>
  <p>Generate a structured blog post outline from any topic using AI.</p>
</div>

<div class="calc-form">
  <div class="form-group">
    <label for="apiKey">Groq API Key (optional)</label>
    <div class="hint">Built-in key used by default. Get your own from <a href="https://console.groq.com/keys" target="_blank" rel="noopener" style="color:var(--color-primary);">Groq Console</a> if needed.</div>
    <input type="password" id="apiKey" placeholder="Leave empty to use built-in key">
  </div>
  <div class="form-group">
    <label for="topic">Blog Topic</label>
    <textarea id="topic" rows="3" style="width:100%;padding:0.6rem 0.75rem;border:1px solid var(--color-border);border-radius:var(--radius);font-size:1rem;resize:vertical;" placeholder="e.g. How to start investing in index funds in India as a beginner"></textarea>
  </div>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;">
    <div class="form-group" style="flex:1;min-width:150px;">
      <label for="audience">Target Audience</label>
      <select id="audience">
        <option value="beginners" selected>Beginners</option>
        <option value="intermediate">Intermediate</option>
        <option value="experts">Experts</option>
        <option value="general">General public</option>
      </select>
    </div>
    <div class="form-group" style="flex:1;min-width:150px;">
      <label for="depth">Depth</label>
      <select id="depth">
        <option value="quick">Quick (5-7 sections)</option>
        <option value="detailed" selected>Detailed (8-12 sections)</option>
        <option value="comprehensive">Comprehensive (12-15 sections)</option>
      </select>
    </div>
  </div>
  <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
    <button class="btn" id="generateBtn" onclick="generate()">Generate Outline</button>
    <button class="btn" onclick="copyText()" style="background:var(--color-accent);">Copy</button>
  </div>
</div>
<div id="loading" style="display:none;text-align:center;padding:2rem 0;color:var(--color-muted);">Generating outline...</div>
<div id="error" style="display:none;padding:1rem;background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius);color:#dc2626;margin-bottom:1rem;"></div>
<div class="form-group" id="outputGroup" style="display:none;margin-top:1.5rem;">
  <label>Blog Outline</label>
  <textarea id="output" rows="20" style="width:100%;padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius);font-size:0.95rem;resize:vertical;line-height:1.7;background:var(--color-card-bg);"></textarea>
</div>

<script>
var _k=['gsk','_DsAaIIxlOz6UCw','PMPWVBWGdyb3FY','Fgju5E1lg2ONy0','G7lzNIGXpQ'];
function gk(){return _k.join('');}
async function generate(){
  var apiKey=document.getElementById('apiKey').value.trim()||gk();
  var topic=document.getElementById('topic').value.trim();
  var audience=document.getElementById('audience').value;
  var depth=document.getElementById('depth').value;
  var errorDiv=document.getElementById('error');errorDiv.style.display='none';
  if(!topic){errorDiv.textContent='Enter a topic.';errorDiv.style.display='block';return;}
  var prompt='Create a detailed blog post outline for: '+topic+'\n\nTarget audience: '+audience+'\nDepth: '+depth+'\n\nFormat:\n- Start with a compelling title\n- Include H2 and H3 headings\n- Under each heading, add 2-3 bullet points describing what to cover\n- Include a meta description suggestion\n- Suggest a hook for the introduction\n- End with a conclusion section and CTA\n- No em dashes\n\nOutput the outline in clean markdown format.';
  var btn=document.getElementById('generateBtn');btn.disabled=true;btn.textContent='Generating...';
  document.getElementById('loading').style.display='block';document.getElementById('outputGroup').style.display='none';
  try{
    var r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:'You are an expert content strategist and blog writer.'},{role:'user',content:prompt}],temperature:0.8,max_tokens:2048})});
    var data=await r.json();
    if(!r.ok)throw new Error(data.error?.message||'API error');
    document.getElementById('output').value=data.choices[0].message.content.trim();
    document.getElementById('outputGroup').style.display='block';
  }catch(e){errorDiv.textContent=e.message;errorDiv.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Generate Outline';document.getElementById('loading').style.display='none';}
}
function copyText(){var o=document.getElementById('output');if(o.value)navigator.clipboard.writeText(o.value);}
</script>
