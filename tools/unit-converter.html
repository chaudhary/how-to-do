---
layout: tool
title: Unit Converter
---

<div class="tool-header">
  <h1>Unit Converter</h1>
  <p>Convert between common units of length, weight, temperature, and volume.</p>
</div>

<div class="calc-form">
  <div class="form-group">
    <label for="category">Category</label>
    <select id="category" onchange="loadUnits()">
      <option value="length">Length</option>
      <option value="weight">Weight</option>
      <option value="temperature">Temperature</option>
      <option value="volume">Volume</option>
      <option value="area">Area</option>
      <option value="speed">Speed</option>
    </select>
  </div>
  <div style="display:flex;gap:1rem;align-items:flex-end;flex-wrap:wrap;">
    <div class="form-group" style="flex:1;min-width:150px;">
      <label for="fromVal">Value</label>
      <input type="number" id="fromVal" placeholder="Enter value" step="any" oninput="convert()">
    </div>
    <div class="form-group" style="flex:1;min-width:150px;">
      <label for="fromUnit">From</label>
      <select id="fromUnit" onchange="convert()"></select>
    </div>
    <div class="form-group" style="flex:1;min-width:150px;">
      <label for="toUnit">To</label>
      <select id="toUnit" onchange="convert()"></select>
    </div>
  </div>
  <div id="convertResult" style="font-size:1.5rem;font-weight:700;color:var(--color-primary);margin-top:1rem;"></div>
</div>

<script>
var units = {
  length: {meter:1, kilometer:1000, centimeter:0.01, millimeter:0.001, mile:1609.344, yard:0.9144, foot:0.3048, inch:0.0254},
  weight: {kilogram:1, gram:0.001, milligram:0.000001, pound:0.453592, ounce:0.0283495, ton:1000},
  temperature: {celsius:'c', fahrenheit:'f', kelvin:'k'},
  volume: {liter:1, milliliter:0.001, gallon:3.78541, quart:0.946353, cup:0.236588, 'fluid ounce':0.0295735, tablespoon:0.0147868, teaspoon:0.00492892},
  area: {'sq meter':1, 'sq kilometer':1000000, 'sq foot':0.092903, 'sq yard':0.836127, acre:4046.86, hectare:10000},
  speed: {'m/s':1, 'km/h':0.277778, 'mph':0.44704, knot:0.514444}
};
function loadUnits() {
  var cat = document.getElementById('category').value;
  var keys = Object.keys(units[cat]);
  ['fromUnit','toUnit'].forEach(function(id, i) {
    var sel = document.getElementById(id);
    sel.innerHTML = '';
    keys.forEach(function(k, j) {
      var o = document.createElement('option'); o.value = k; o.textContent = k;
      if (i === 1 && j === 1) o.selected = true;
      sel.appendChild(o);
    });
  });
  convert();
}
function convert() {
  var cat = document.getElementById('category').value;
  var val = parseFloat(document.getElementById('fromVal').value);
  var from = document.getElementById('fromUnit').value;
  var to = document.getElementById('toUnit').value;
  if (isNaN(val)) { document.getElementById('convertResult').textContent = ''; return; }
  var result;
  if (cat === 'temperature') {
    var celsius;
    if (from === 'celsius') celsius = val;
    else if (from === 'fahrenheit') celsius = (val - 32) * 5/9;
    else celsius = val - 273.15;
    if (to === 'celsius') result = celsius;
    else if (to === 'fahrenheit') result = celsius * 9/5 + 32;
    else result = celsius + 273.15;
  } else {
    var base = val * units[cat][from];
    result = base / units[cat][to];
  }
  document.getElementById('convertResult').textContent = val + ' ' + from + ' = ' + result.toLocaleString(undefined,{maximumFractionDigits:6}) + ' ' + to;
}
loadUnits();
</script>
