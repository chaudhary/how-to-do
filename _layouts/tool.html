<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <a href="{{ '/' | relative_url }}" class="site-title">
          <img src="{{ '/assets/images/logo-icon.svg' | relative_url }}" alt="{{ site.title }}" class="site-logo" width="28" height="28">
          {{ site.title }}
        </a>
        <nav style="display:flex;gap:1.25rem;font-size:0.95rem;">
          <a href="{{ '/' | relative_url }}" style="color:var(--color-text);text-decoration:none;">Home</a>
          <a href="{{ '/tools' | relative_url }}" style="color:var(--color-text);text-decoration:none;">Tools</a>
        </nav>
      </div>
      <p class="site-tagline">{{ site.description }}</p>
    </div>
  </header>

  <main class="container">
    <nav aria-label="Breadcrumb" class="breadcrumb">
      <a href="{{ '/' | relative_url }}">Home</a> &rsaquo;
      <a href="{{ '/tools' | relative_url }}">Tools</a> &rsaquo;
      {{ page.title }}
    </nav>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-tools">
        <h3>Tools</h3>
        <div class="footer-tools-grid">
          {% include footer-tools.html %}
        </div>
      </div>
      <p class="footer-credit">&copy; {{ 'now' | date: '%Y' }} {{ site.title }}. Developed and hosted by Amit Chaudhary (chaudharyamitiit2007@gmail.com)</p>
    </div>
  </footer>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "{{ page.title | escape }}",
    "url": "{{ site.url }}{{ page.url }}",
    "description": "{{ page.description | default: page.title | escape }}",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "Any",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "provider": {
      "@type": "Organization",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {"@type": "ListItem", "position": 1, "name": "Home", "item": "{{ site.url }}"},
      {"@type": "ListItem", "position": 2, "name": "Tools", "item": "{{ site.url }}/tools"},
      {"@type": "ListItem", "position": 3, "name": "{{ page.title | escape }}", "item": "{{ site.url }}{{ page.url }}"}
    ]
  }
  </script>
</body>
</html>
