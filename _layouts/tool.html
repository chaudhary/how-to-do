<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <a href="{{ '/' | relative_url }}" class="site-title">
          <img src="{{ '/assets/images/logo-icon.svg' | relative_url }}" alt="" class="site-logo" width="28" height="28">
          {{ site.title }}
        </a>
        <nav style="display:flex;gap:1.25rem;font-size:0.95rem;">
          <a href="{{ '/' | relative_url }}" style="color:var(--color-text);text-decoration:none;">Tools</a>
          <a href="{{ '/blog' | relative_url }}" style="color:var(--color-text);text-decoration:none;">Blog</a>
        </nav>
      </div>
      <p class="site-tagline">{{ site.description }}</p>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumb">
      <a href="{{ '/' | relative_url }}">Home</a> &rsaquo; {{ page.title }}
    </nav>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title }}. Developed and hosted by Amit Chaudhary (chaudharyamitiit2007@gmail.com)</p>
    </div>
  </footer>
</body>
</html>
