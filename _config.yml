title: How To Do
tagline: Free Online Calculators & Tools
description: "Free online calculators, converters, and developer tools. EMI, SIP, BMI, unit converter, JSON formatter, and 40+ more tools, no sign-up required."
baseurl: ""
url: "https://how-to-do.online"
lang: en-IN

author:
  name: Amit Chaudhary
  email: chaudharyamitiit2007@gmail.com

logo: /assets/images/logo-icon.svg

# SEO defaults
social:
  name: How To Do
  links:
    - https://how-to-do.online

locale: en_IN

markdown: kramdown
theme: minima

permalink: /blog/:title/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

defaults:
  - scope:
      path: "tools"
      type: "pages"
    values:
      layout: tool
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: post

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - todos.md
